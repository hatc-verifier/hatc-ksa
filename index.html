<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    
    .header { text-align: center; padding: 10px 0; border-bottom: 2.5px solid #555; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }
    
    /* পুরো কন্টেইনারটি মাঝখানে রাখার জন্য */
    .container { 
      max-width: 900px; 
      margin: 15px auto; 
      padding: 0 10px; 
      display: flex;
      flex-direction: column;
      align-items: center; /* সব এলিমেন্ট মাঝখানে থাকবে */
    }
    
    .instruction { 
      font-size: 13px; 
      font-weight: bold; 
      color: #000;
      margin-bottom: 15px; 
      border-bottom: 1px solid #ccc; 
      padding-bottom: 12px;
      width: 100%;
      text-align: center; /* লেখাটি মাঝখানে থাকবে */
      /* white-space: nowrap সলানো হয়েছে যাতে ছোট স্ক্রিনে লেখা কেটে না যায় */
    }

    .search-row { 
      display: flex; 
      align-items: center; 
      justify-content: center; /* ইনপুট বক্স ও বাটন মাঝখানে রাখবে */
      gap: 8px; 
      width: 100%;
    }

    span { font-size: 14px; font-weight: normal; }

    input { 
      padding: 2px 5px; 
      font-size: 14px; 
      border: 1px solid #7a7a7a; 
      width: 150px; /* আপনার চাহিদা মতো ছোট বক্স */
      height: 20px; 
      outline: none;
    }

    button { 
      padding: 0 10px; 
      font-size: 12px; 
      background: #efefef; 
      border: 1px solid #767676; 
      cursor: pointer; 
      height: 26px;
      white-space: nowrap;
    }

    /* মোবাইলের জন্য লেখাটি এক লাইনে ধরে রাখার চেষ্টা */
    @media (max-width: 600px) {
      .instruction { 
        font-size: 10.5px; 
      }
      input { width: 130px; }
    }
  </style>
</head>
<body>
  <div class="header"><img src="header.png" alt="Header"></div>
  <div class="container">
    <div class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </div>
    <div class="search-row">
      <span>C.No</span>
      <input type="text" id="certNo">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>
  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (no) { window.location.href = 'certificate.html?cno=' + no; }
    }
    document.getElementById("certNo").addEventListener("keyup", function(event) {
      if (event.key === "Enter") checkCertificate();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    
    .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #555; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }

    .container { max-width: 900px; margin: 15px auto; padding: 0 10px; }

    /* হুবহু স্ক্রিনশটের মতো ইন্সট্রাকশন স্টাইল */
    .instruction { 
      font-size: 13.5px; 
      font-weight: bold; 
      color: #000;
      margin-bottom: 15px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 10px;
      line-height: 1.3;
    }

    /* ইনপুট এবং বাটনের এলাইনমেন্ট */
    .search-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
    }

    input { 
      padding: 2px 5px; 
      font-size: 14px; 
      border: 1px solid #7a7a7a; 
      width: 250px; /* বক্সের সাইজ স্ক্রিনশট অনুযায়ী */
      height: 22px;
    }

    button { 
      padding: 2px 10px; 
      font-size: 13px; 
      background: #efefef; /* ডিফল্ট গ্রে বাটন */
      border: 1px solid #767676;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="container">
    <div class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </div>

    <div class="search-row">
      <span>C.No</span>
      <input type="text" id="certNo" value="121086">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script>
    function checkCertificate() {
      const no = document.getElementById('cert_no').value.trim(); // আপনার ইনপুট আইডি অনুযায়ী
      if (no) {
        window.location.href = 'certificate.html?cno=' + no;
      }
    }
  </script>
</body>
</html>

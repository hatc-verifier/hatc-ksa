<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; color: #000; }
    .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #555; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }
    .container { max-width: 900px; margin: 20px auto; text-align: center; padding: 0 10px; }
    .instruction { font-size: 13px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; text-align: left; }
    .search-box { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; }
    input { padding: 2px 5px; font-size: 13px; border: 1px solid #777; width: 150px; }
    button { padding: 2px 10px; font-size: 12px; background: #f0f0f0; color: black; border: 1px solid #777; cursor: pointer; }
    button:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="header">
    <img src="header.png" alt="Header">
  </div>
  <div class="container">
    <p class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </p>
    <div class="search-box">
      <span>C.No</span>
      <input type="text" id="certNo" value="121086">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (!no) {
        alert('Please enter C.No!');
        return;
      }
      window.location.href = 'certificate.html?cno=' + no;
    }
    document.getElementById("certNo").addEventListener("keyup", function(event) {
      if (event.key === "Enter") checkCertificate();
    });
  </script>
</body>
</html>

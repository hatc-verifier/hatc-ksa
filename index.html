<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    
    /* হেডার সেকশন */
    .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #666; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }

    .container { max-width: 900px; margin: 30px auto; padding: 0 15px; text-align: left; }

    /* টেক্সট স্টাইল */
    .instruction { 
      font-size: 16px; 
      font-weight: bold; 
      color: #000;
      margin-bottom: 20px;
      line-height: 1.4;
      border-bottom: 1px solid #ccc;
      padding-bottom: 15px;
    }

    /* সার্চ বক্স এলাইনমেন্ট */
    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
    }

    input { 
      padding: 5px; 
      font-size: 16px; 
      border: 1px solid #000; 
      width: 300px; /* বক্সের দৈর্ঘ্য বাড়ানো হয়েছে */
      height: 30px;
    }

    button { 
      padding: 5px 15px; 
      font-size: 14px; 
      background: #efefef; 
      border: 1px solid #767676;
      cursor: pointer;
      height: 42px; /* বাটনের উচ্চতা স্ক্রিনশট অনুযায়ী */
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="container">
    <div class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </div>

    <div class="search-row">
      <span>C.No</span>
      <input type="text" id="certNo" placeholder="">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (no) {
        window.location.href = 'certificate.html?cno=' + no;
      } else {
        alert("Please enter a Certificate Number");
      }
    }
  </script>
</body>
</html>

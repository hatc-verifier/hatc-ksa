<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    .header { text-align: center; padding: 10px 0; border-bottom: 2.5px solid #555; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }
    
    .container { max-width: 900px; margin: 15px auto; padding: 0 10px; }
    
    .instruction { 
      font-size: 13px; /* ফন্ট সাইজ অরিজিনাল সাইটের মতো করা হয়েছে */
      font-weight: bold; 
      color: #000;
      margin-bottom: 15px; 
      border-bottom: 1px solid #ccc; 
      padding-bottom: 12px;
      line-height: 1.2;
      white-space: nowrap; /* এটি লেখাটিকে বাধ্যতামূলকভাবে এক লাইনে রাখবে */
      overflow: hidden;    /* যদি স্ক্রিন খুব ছোট হয় তবে বাড়তি অংশ লুকানো থাকবে */
    }

    .search-row { 
      display: flex; 
      align-items: center; 
      gap: 5px; /* গ্যাপ কমানো হয়েছে */
    }

    span { font-size: 13px; font-weight: normal; }

    input { 
      padding: 2px 4px; 
      font-size: 13px; 
      border: 1px solid #999; 
      width: 150px; /* বক্সের সাইজ ছোট করা হয়েছে */
      height: 18px; /* উচ্চতা কমানো হয়েছে */
      outline: none;
    }

    button { 
      padding: 0 8px; 
      font-size: 11.5px; 
      background: #f0f0f0; 
      border: 1px solid #767676; 
      cursor: pointer; 
      height: 22px;
      white-space: nowrap;
    }

    /* মোবাইলের জন্য ছোট অ্যাডজাস্টমেন্ট */
    @media (max-width: 600px) {
      .instruction { 
        font-size: 11px; /* মোবাইলে লেখা যেন আরও সহজে এক লাইনে আটে */
      }
      input { width: 120px; }
    }
  </style>
</head>
<body>
  <div class="header"><img src="header.png" alt="Header"></div>
  <div class="container">
    <div class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </div>
    <div class="search-row">
      <span>C.No</span>
      <input type="text" id="certNo">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>
  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (no) { window.location.href = 'certificate.html?cno=' + no; }
    }
    document.getElementById("certNo").addEventListener("keyup", function(event) {
      if (event.key === "Enter") checkCertificate();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification - HATC</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      font-family: Arial, sans-serif; /* ডিফল্ট এবং ক্লিন ফন্ট */
      background: #fff; 
      color: #000; 
    }
    .header { 
      text-align: center; 
      padding: 10px 0; 
      border-bottom: 2px solid #555; /* ছবির মতো চিকন কালো বর্ডার */
    }
    .header img { 
      width: 100%; 
      max-width: 900px; 
      height: auto; 
      display: block; 
      margin: 0 auto; 
    }
    .container { 
      max-width: 900px; 
      margin: 20px auto; 
      text-align: center; 
      padding: 0 10px; 
    }
    .instruction { 
      font-size: 13px; /* ছবির মতো ছোট ফন্ট */
      font-weight: bold; 
      margin-bottom: 20px; 
      border-bottom: 1px solid #ccc; 
      padding-bottom: 10px; 
      text-align: left; /* ছবির মতো বাম দিকে সাজানো */
    }
    .search-box { 
      display: inline-flex; /* বাটন এবং ইনপুটকে পাশাপাশি রাখার জন্য */
      align-items: center; 
      gap: 5px; 
      font-size: 13px; 
    }
    input { 
      padding: 2px 5px; 
      font-size: 13px; 
      border: 1px solid #777; /* ছবিতে যেমন দেখাচ্ছে */
      width: 150px; /* ছোট ইনপুট বক্স */
    }
    /* ব্রাউজারের ডিফল্ট বাটন স্টাইল */
    button { 
      padding: 2px 10px; 
      font-size: 12px; 
      background: #f0f0f0; /* গ্রে বাটন */
      color: black; 
      border: 1px solid #777; 
      cursor: pointer; 
    }
    button:hover { 
      background: #e0e0e0; /* হোভার করার সময় সামান্য গ্রেড */
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="container">
    <p class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </p>

    <div class="search-box">
      <span>C.No</span>
      <input type="text" id="certNo" value="121086"> 
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (!no) {
        alert('Please enter C.No!');
        return;
      }
      // এটি 'certificate.html' পেজে নিয়ে যাবে যেখানে রেজাল্ট দেখাবে
      window.location.href = 'certificate.html?cno=' + no;
    }
    
    // এন্টার চাপলে যেন সার্চ হয়
    document.getElementById("certNo").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        checkCertificate();
      }
    });
  </script>
</body>
</html>
